<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distribuție Vehicule Electrice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --graphite: #161b22;
        --graphite-2: #20272f;
        --teal: #0fbf9f;
        --teal-dark: #0b9b82;
        --amber: #f0a93b;
        --bg: #f5f7f8;
        --line: #e3e7e9;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg);
      }
      h1,
      h2,
      h3,
      .brand {
        font-family: "Manrope", system-ui, sans-serif;
      }
      .btn-primary {
        background: var(--teal);
        color: #0a1210;
        font-weight: 700;
      }
      .btn-primary:hover {
        background: var(--teal-dark);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .tab-active {
        border-bottom: 2px solid var(--teal);
        color: #111827;
      }
      .tab-inactive {
        border-bottom: 2px solid transparent;
        color: #6b7280;
      }
      .role-pill {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.03em;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .role-magazin {
        background: #e6f4ff;
        color: #1d6fa5;
      }
      .role-agent {
        background: #eaf7f0;
        color: #0b8a5f;
      }
      .role-admin {
        background: #fff1de;
        color: #b4650b;
      }
      .role-superadmin {
        background: #f3e8ff;
        color: #7c3aed;
      }
      .role-none {
        background: #f1f2f4;
        color: #8a8f98;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: #d3d8da;
        border-radius: 4px;
      }
      .fade-in {
        animation: fadeIn 0.25s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="min-h-screen">
    <!-- ============================================================ -->
    <!-- CONFIG SUPABASE — completează cu datele proiectului tău      -->
    <!-- ============================================================ -->
    <script>
      const SUPABASE_URL = "https://ksjvpuyiuplaonpbwrfn.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzanZwdXlpdXBsYW9ucGJ3cmZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMDgyNDEsImV4cCI6MjA5OTY4NDI0MX0._Wp1Ty4KBFJORjmI41S5eFfVulZJyhMr0ODGykn49uM";
      const supa = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
    </script>

    <div id="app" class="min-h-screen"></div>

    <script>
      const app = document.getElementById("app");
      let currentUser = null;
      let currentProfile = null;
      let recoveryMode = false;

      // ------------------------------------------------------------------
      // UTIL
      // ------------------------------------------------------------------
      function esc(str) {
        if (str === null || str === undefined) return "";
        return String(str).replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }
      function toast(msg, isError = false) {
        const el = document.createElement("div");
        el.className = `fixed bottom-5 right-5 z-50 px-4 py-3 rounded-lg shadow-lg text-sm font-medium fade-in ${isError ? "bg-red-600 text-white" : "bg-[var(--graphite)] text-white"}`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3500);
      }
      function rolePill(role) {
        const map = {
          magazin: ["Magazin", "role-magazin"],
          agent: ["Agent", "role-agent"],
          admin: ["Admin", "role-admin"],
          superadmin: ["Super Admin", "role-superadmin"],
        };
        const [label, cls] = map[role] || ["Fără rol", "role-none"];
        return `<span class="role-pill ${cls}">${label}</span>`;
      }

      // ------------------------------------------------------------------
      // BOOTSTRAP — verifică sesiunea existentă și ascultă schimbări
      // ------------------------------------------------------------------
      supa.auth.onAuthStateChange((event, session) => {
        if (event === "PASSWORD_RECOVERY") {
          recoveryMode = true;
          renderResetPassword();
          return;
        }
        if (event === "SIGNED_OUT") {
          currentUser = null;
          currentProfile = null;
          renderAuthScreen();
          return;
        }
        if (session && !recoveryMode) {
          currentUser = session.user;
          loadProfileAndRender();
        }
      });

      (async function init() {
        const tokenHash = new URLSearchParams(window.location.search).get(
          "token_hash",
        );
        const otpType = new URLSearchParams(window.location.search).get("type");
        if (tokenHash && otpType) {
          renderConfirmScreen(tokenHash, otpType);
          return;
        }
        const {
          data: { session },
        } = await supa.auth.getSession();
        if (session) {
          currentUser = session.user;
          await loadProfileAndRender();
        } else {
          renderAuthScreen();
        }
      })();

      // ==================================================================
      // ECRAN DE CONFIRMARE MANUALĂ (email verificare / resetare parolă)
      // Necesită un click explicit înainte de a valida tokenul, ca linkul
      // să nu fie "consumat" automat de scanerele anti-phishing ale emailurilor.
      // ==================================================================
      function renderConfirmScreen(tokenHash, type) {
        const isRecovery = type === "recovery";
        app.innerHTML = `
  <div class="min-h-screen flex items-center justify-center px-4" style="background:radial-gradient(circle at 20% 20%, #1B2430 0%, #0E1318 65%);">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-xl p-6 fade-in text-center">
        <h2 class="text-lg font-bold mb-2">${isRecovery ? "Resetare parolă" : "Confirmare cont"}</h2>
        <p class="text-sm text-slate-500 mb-5">${isRecovery ? "Apasă butonul de mai jos pentru a continua resetarea parolei." : "Apasă butonul de mai jos pentru a-ți confirma adresa de email."}</p>
        <button id="btn-confirm-otp" class="w-full btn-primary rounded-lg py-2.5 text-sm">${isRecovery ? "Continuă" : "Confirmă contul"}</button>
        <p id="confirm-msg" class="text-sm text-center mt-3"></p>
      </div>
    </div>
  </div>`;

        document
          .getElementById("btn-confirm-otp")
          .addEventListener("click", async () => {
            const btn = document.getElementById("btn-confirm-otp");
            const msg = document.getElementById("confirm-msg");
            btn.disabled = true;
            btn.textContent = "Se verifică...";

            const { error } = await supa.auth.verifyOtp({
              token_hash: tokenHash,
              type,
            });

            // curăță parametrii din URL, ca linkul să nu mai poată fi refolosit din istoric
            window.history.replaceState(
              {},
              document.title,
              window.location.pathname,
            );

            if (error) {
              msg.className = "text-sm text-center text-red-600 mt-3";
              msg.textContent = "Linkul nu mai este valid. Cere un link nou.";
              btn.disabled = false;
              btn.textContent = isRecovery ? "Continuă" : "Confirmă contul";
              return;
            }

            if (isRecovery) {
              recoveryMode = true;
              renderResetPassword();
            } else {
              await supa.auth.signOut();
              renderAuthScreen("login");
              toast("Cont confirmat cu succes. Te poți autentifica.");
            }
          });
      }

      async function loadProfileAndRender() {
        const { data, error } = await supa
          .from("profiles")
          .select("*")
          .eq("id", currentUser.id)
          .single();
        if (error) {
          toast("Eroare la încărcarea profilului: " + error.message, true);
        }
        currentProfile = data || null;
        renderShell();
      }

      // ==================================================================
      // ECRAN AUTENTIFICARE (Autentificare / Cont nou / Am uitat parola)
      // ==================================================================
      function renderAuthScreen(mode = "login") {
        app.innerHTML = `
  <div class="min-h-screen flex items-center justify-center px-4" style="background:radial-gradient(circle at 20% 20%, #1B2430 0%, #0E1318 65%);">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 mb-2">
          <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:var(--teal)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill="#0A1210"/></svg>
          </div>
          <span class="brand text-white text-xl font-extrabold tracking-tight">EV Distribuție</span>
        </div>
        <p class="text-slate-400 text-sm">Platformă de distribuție vehicule electrice</p>
      </div>

      <div class="bg-white rounded-2xl shadow-xl p-6 fade-in">
        <div class="flex text-sm font-semibold mb-6 border-b" style="border-color:var(--line)">
          <button data-tab="login" class="auth-tab px-3 py-2 -mb-px ${mode === "login" ? "tab-active" : "tab-inactive"}">Autentificare</button>
          <button data-tab="signup" class="auth-tab px-3 py-2 -mb-px ${mode === "signup" ? "tab-active" : "tab-inactive"}">Cont nou</button>
          <button data-tab="forgot" class="auth-tab px-3 py-2 -mb-px ${mode === "forgot" ? "tab-active" : "tab-inactive"}">Am uitat parola</button>
        </div>
        <div id="auth-panel"></div>
      </div>
      <p class="text-center text-slate-500 text-xs mt-6">© ${new Date().getFullYear()} EV Distribuție</p>
    </div>
  </div>`;

        document.querySelectorAll(".auth-tab").forEach((btn) => {
          btn.addEventListener("click", () =>
            renderAuthScreen(btn.dataset.tab),
          );
        });

        const panel = document.getElementById("auth-panel");
        if (mode === "login") panel.innerHTML = loginForm();
        if (mode === "signup") panel.innerHTML = signupForm();
        if (mode === "forgot") panel.innerHTML = forgotForm();

        if (mode === "login") bindLoginForm();
        if (mode === "signup") bindSignupForm();
        if (mode === "forgot") bindForgotForm();
      }

      function fieldLabel(txt) {
        return `<label class="block text-sm font-medium text-slate-700 mb-1">${txt}</label>`;
      }
      function inputBase() {
        return "w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--teal)] focus:border-transparent";
      }

      function loginForm() {
        return `
  <form id="form-login" class="space-y-4">
    <div>${fieldLabel("Email")}<input type="email" id="login-email" required class="${inputBase()}" placeholder="nume@exemplu.ro"></div>
    <div>${fieldLabel("Parolă")}<input type="password" id="login-pass" required class="${inputBase()}" placeholder="••••••••"></div>
    <button type="submit" class="w-full btn-primary rounded-lg py-2.5 text-sm">Autentificare</button>
    <p id="login-msg" class="text-sm text-center"></p>
  </form>`;
      }
      function bindLoginForm() {
        document
          .getElementById("form-login")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector("button");
            btn.disabled = true;
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-pass").value;
            const { error } = await supa.auth.signInWithPassword({
              email,
              password,
            });
            btn.disabled = false;
            const msg = document.getElementById("login-msg");
            if (error) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = error.message.includes("Invalid login")
                ? "Email sau parolă incorectă."
                : error.message;
            }
          });
      }

      function signupForm() {
        return `
  <form id="form-signup" class="space-y-4">
    <div>${fieldLabel("Email")}<input type="email" id="signup-email" required class="${inputBase()}" placeholder="nume@exemplu.ro"></div>
    <div>${fieldLabel("Parolă")}<input type="password" id="signup-pass" required minlength="6" class="${inputBase()}" placeholder="Minim 6 caractere"></div>
    <div>${fieldLabel("Confirmă parola")}<input type="password" id="signup-pass2" required minlength="6" class="${inputBase()}"></div>
    <button type="submit" class="w-full btn-primary rounded-lg py-2.5 text-sm">Creează cont</button>
    <p id="signup-msg" class="text-sm text-center"></p>
    <p class="text-xs text-slate-500 text-center">Contul nou nu are niciun rol alocat. Un administrator va activa contul și îi va atribui rolul.</p>
  </form>`;
      }
      function bindSignupForm() {
        document
          .getElementById("form-signup")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector("button");
            const msg = document.getElementById("signup-msg");
            const email = document.getElementById("signup-email").value.trim();
            const pass = document.getElementById("signup-pass").value;
            const pass2 = document.getElementById("signup-pass2").value;
            if (pass !== pass2) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = "Parolele nu coincid.";
              return;
            }
            btn.disabled = true;
            const { error } = await supa.auth.signUp({
              email,
              password: pass,
              options: {
                emailRedirectTo:
                  window.location.origin + window.location.pathname,
              },
            });
            btn.disabled = false;
            if (error) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = error.message;
            } else {
              msg.className = "text-sm text-center text-emerald-600";
              msg.textContent =
                "Cont creat. Verifică emailul pentru confirmare (dacă este activată), apoi autentifică-te.";
              e.target.reset();
            }
          });
      }

      function forgotForm() {
        return `
  <form id="form-forgot" class="space-y-4">
    <p class="text-sm text-slate-500">Introdu adresa de email folosită la înregistrare. Vei primi un link de resetare a parolei.</p>
    <div>${fieldLabel("Email")}<input type="email" id="forgot-email" required class="${inputBase()}" placeholder="nume@exemplu.ro"></div>
    <button type="submit" class="w-full btn-primary rounded-lg py-2.5 text-sm">Trimite link de resetare</button>
    <p id="forgot-msg" class="text-sm text-center"></p>
  </form>`;
      }
      function bindForgotForm() {
        document
          .getElementById("form-forgot")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector("button");
            const msg = document.getElementById("forgot-msg");
            const email = document.getElementById("forgot-email").value.trim();
            btn.disabled = true;
            const { error } = await supa.auth.resetPasswordForEmail(email, {
              redirectTo: window.location.origin + window.location.pathname,
            });
            btn.disabled = false;
            if (error) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = error.message;
            } else {
              msg.className = "text-sm text-center text-emerald-600";
              msg.textContent =
                "Dacă adresa există, un email cu linkul de resetare a fost trimis.";
            }
          });
      }

      // ==================================================================
      // ECRAN MODIFICARE PAROLĂ (după click pe linkul din email)
      // ==================================================================
      function renderResetPassword() {
        app.innerHTML = `
  <div class="min-h-screen flex items-center justify-center px-4" style="background:radial-gradient(circle at 20% 20%, #1B2430 0%, #0E1318 65%);">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-xl p-6 fade-in">
        <h2 class="text-lg font-bold mb-1">Modificare parolă</h2>
        <p class="text-sm text-slate-500 mb-5">Alege o parolă nouă pentru contul tău.</p>
        <form id="form-reset" class="space-y-4">
          <div>${fieldLabel("Parolă nouă")}<input type="password" id="reset-pass" required minlength="6" class="${inputBase()}"></div>
          <div>${fieldLabel("Confirmă parola nouă")}<input type="password" id="reset-pass2" required minlength="6" class="${inputBase()}"></div>
          <button type="submit" class="w-full btn-primary rounded-lg py-2.5 text-sm">Salvează parola nouă</button>
          <p id="reset-msg" class="text-sm text-center"></p>
        </form>
      </div>
    </div>
  </div>`;

        document
          .getElementById("form-reset")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const msg = document.getElementById("reset-msg");
            const p1 = document.getElementById("reset-pass").value;
            const p2 = document.getElementById("reset-pass2").value;
            if (p1 !== p2) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = "Parolele nu coincid.";
              return;
            }
            const { error } = await supa.auth.updateUser({ password: p1 });
            if (error) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = error.message;
            } else {
              msg.className = "text-sm text-center text-emerald-600";
              msg.textContent = "Parola a fost schimbată. Redirecționare...";
              recoveryMode = false;
              setTimeout(async () => {
                const {
                  data: { session },
                } = await supa.auth.getSession();
                if (session) {
                  currentUser = session.user;
                  await loadProfileAndRender();
                } else renderAuthScreen();
              }, 1200);
            }
          });
      }

      // ==================================================================
      // SHELL APLICAȚIE (după autentificare)
      // ==================================================================
      function renderShell() {
        if (!currentProfile) {
          renderPendingRole();
          return;
        }
        if (!currentProfile.role) {
          renderPendingRole();
          return;
        }

        const tabs = tabsForRole(currentProfile.role);

        app.innerHTML = `
  <div class="min-h-screen md:flex">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-20 hidden"></div>
    <aside id="app-sidebar" class="w-64 md:w-60 shrink-0 text-white flex flex-col fixed md:static inset-y-0 left-0 z-30 -translate-x-full md:translate-x-0 transition-transform duration-200 ease-out" style="background:var(--graphite)">
      <div class="px-5 py-5 flex items-center gap-2 border-b border-white/10">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style="background:var(--teal)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill="#0A1210"/></svg>
        </div>
        <span class="brand font-extrabold tracking-tight">EV Distribuție</span>
        <button id="btn-close-sidebar" class="ml-auto md:hidden text-slate-400 hover:text-white text-xl leading-none px-1">✕</button>
      </div>
      <nav id="side-nav" class="flex-1 px-3 py-4 space-y-1 overflow-y-auto"></nav>
      <div class="px-4 py-4 border-t border-white/10">
        <div class="text-xs text-slate-400 mb-0.5">${esc(currentProfile.email)}</div>
        <div class="mb-3 flex items-center gap-1.5 flex-wrap">
          ${rolePill(currentProfile.role)}
          ${
            currentProfile.role === "magazin"
              ? currentProfile.nume
                ? `<span class="text-xs text-slate-300">${esc(currentProfile.nume)}${currentProfile.filiala ? " - " + esc(currentProfile.filiala) : ""}</span>`
                : ""
              : currentProfile.nume
                ? `<span class="text-xs text-slate-300">${esc(currentProfile.nume)}</span>`
                : ""
          }
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          <button id="btn-change-pass" class="text-xs text-slate-300 hover:text-white underline">Schimbă parola</button>
          <span class="text-slate-600 text-xs">·</span>
          <button id="btn-logout" class="text-xs text-slate-300 hover:text-white underline">Deconectare</button>
        </div>
      </div>
    </aside>
    <main class="flex-1 min-w-0">
      <header class="bg-white border-b px-4 md:px-6 py-4 flex items-center gap-3" style="border-color:var(--line)">
        <button id="btn-open-sidebar" class="md:hidden text-slate-600 hover:text-slate-900 text-xl leading-none px-1" aria-label="Deschide meniul">☰</button>
        <h1 id="page-title" class="text-base md:text-lg font-bold text-slate-800"></h1>
      </header>
      <div id="page-content" class="p-4 md:p-6"></div>
    </main>
  </div>`;

        function openSidebar() {
          document
            .getElementById("app-sidebar")
            .classList.remove("-translate-x-full");
          document.getElementById("sidebar-overlay").classList.remove("hidden");
        }
        function closeSidebar() {
          document
            .getElementById("app-sidebar")
            .classList.add("-translate-x-full");
          document.getElementById("sidebar-overlay").classList.add("hidden");
        }
        document
          .getElementById("btn-open-sidebar")
          .addEventListener("click", openSidebar);
        document
          .getElementById("btn-close-sidebar")
          .addEventListener("click", closeSidebar);
        document
          .getElementById("sidebar-overlay")
          .addEventListener("click", closeSidebar);

        const nav = document.getElementById("side-nav");
        nav.innerHTML = tabs
          .map(
            (t, i) => `
    <button data-key="${t.key}" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium ${i === 0 ? "bg-white/10 text-white" : "text-slate-300 hover:bg-white/5"}">${t.label}</button>
  `,
          )
          .join("");
        nav.querySelectorAll(".nav-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            nav
              .querySelectorAll(".nav-btn")
              .forEach(
                (b) =>
                  (b.className =
                    "nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/5"),
              );
            btn.className =
              "nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium bg-white/10 text-white";
            openTab(btn.dataset.key, tabs);
            closeSidebar();
          });
        });
        document
          .getElementById("btn-logout")
          .addEventListener("click", async () => {
            await supa.auth.signOut();
          });
        document
          .getElementById("btn-change-pass")
          .addEventListener("click", () => {
            renderChangePasswordModal();
          });

        openTab(tabs[0].key, tabs);
      }

      function tabsForRole(role) {
        const common = [];
        if (role === "magazin")
          return [
            { key: "stoc", label: "Stocul meu" },
            { key: "comenzi", label: "Comenzile mele" },
            { key: "statistici", label: "Statistici" },
          ];
        if (role === "agent")
          return [
            { key: "comenzi", label: "Comenzile mele" },

        "Bicicletă electrică",
        "Tricicletă electrică",
        "Scuter electric",
        "Cvadriciclu electric",
      ];
      // Valoare specială folosită în selectul "Magazin" al comenzii noi
      // pentru opțiunea "Vânzare directă" (disponibilă doar pentru
      // admin/superadmin, invizibilă agenților). Nu este un id de magazin
      // real — comanda/produsul rezultat rămân cu magazin_id = null și
      // primesc marcajul vanzare_directa = true.
      const VANZARE_DIRECTA = "__vanzare_directa__";
      // TVA_RATE este acum editabilă din interfață (tab "Depozit central") și
      // persistată în tabelul Supabase `setari_aplicatie` (rând unic, id=1).
      // Valoarea de mai jos este doar un fallback până la încărcarea reală.
      let TVA_RATE = 0.19;

      // Încarcă procentul de TVA curent din Supabase. Dacă tabelul nu există
      // încă sau apare o eroare, se păstrează valoarea implicită de mai sus,
      // fără a bloca restul aplicației.
      async function loadTvaRate() {
        try {
          const { data, error } = await supa
            .from("setari_aplicatie")
            .select("tva_procent")
            .eq("id", 1)
            .maybeSingle();
          if (!error && data && typeof data.tva_procent === "number") {
            TVA_RATE = data.tva_procent / 100;
          }
        } catch (e) {
          // Tabelul de setări nu există încă — se folosește valoarea implicită.
        }
        return TVA_RATE;
      }

      // Salvează un nou procent de TVA (ex: 21 pentru 21%) în Supabase și
      // actualizează valoarea folosită în calculele curente ale sesiunii.
      async function saveTvaRate(procent) {
        const { error } = await supa.from("setari_aplicatie").upsert({
          id: 1,
          tva_procent: procent,
          updated_at: new Date().toISOString(),
        });
        if (!error) {
          TVA_RATE = procent / 100;
        }
        return { error };
      }

      function generateProductId() {
        const d = new Date();
        const zz = String(d.getDate()).padStart(2, "0");
        const ll = String(d.getMonth() + 1).padStart(2, "0");
        const aa = String(d.getFullYear()).slice(-2);
        const rand = String(Math.floor(Math.random() * 1000)).padStart(3, "0");
        return `${zz}${ll}${aa}${rand}`;
      }

      function fmtNum(n) {
        if (n === null || n === undefined || n === "") return "—";
        return Number(n).toFixed(2);
      }

      // Returnează lista valorilor distincte, deja folosite, din coloana
      // "marca" a produselor — folosită pentru autocompletarea câmpului Marcă,
      // la fel ca la Agent/Magazin (sugestii selectabile, dar text liber permis).
      function distinctMarci(produse) {
        const set = new Set();
        (produse || []).forEach((p) => {
          if (p.marca) set.add(p.marca);
        });
        return Array.from(set).sort((a, b) => a.localeCompare(b, "ro"));
      }

      // Atașează căutare live (autocomplete) unui câmp text: pe măsură ce se
      // tastează, afișează sub câmp potrivirile din lista de nume; la click
      // pe o sugestie, aceasta este inscrisă integral în câmp. Dacă nu există
      // potriviri, numele poate fi introdus manual în întregime.
      function attachAgentAutocomplete(inputEl, listEl, names) {
        function renderMatches() {
          const q = inputEl.value.trim().toLowerCase();
          if (!q) {
            listEl.classList.add("hidden");
            listEl.innerHTML = "";
            return;
          }
          const matches = names
            .filter((n) => n.toLowerCase().includes(q))
            .slice(0, 8);
          if (!matches.length) {
            listEl.classList.add("hidden");
            listEl.innerHTML = "";
            return;
          }
          listEl.innerHTML = matches
            .map(
              (n) =>
                `<div class="agent-suggestion px-3 py-1.5 hover:bg-slate-100 cursor-pointer">${esc(n)}</div>`,
            )
            .join("");
          listEl.classList.remove("hidden");
          listEl.querySelectorAll(".agent-suggestion").forEach((el, i) => {
            el.addEventListener("mousedown", (e) => {
              e.preventDefault();
              inputEl.value = matches[i];
              listEl.classList.add("hidden");
              listEl.innerHTML = "";
            });
          });
        }
        inputEl.addEventListener("input", renderMatches);
        inputEl.addEventListener("focus", renderMatches);
        inputEl.addEventListener("blur", () => {
          setTimeout(() => {
            listEl.classList.add("hidden");
          }, 150);
        });
      }

      // Variantă a căutării live pentru câmpul Magazin: potrivirile provin din
      // profilurile de tip magazin, iar la selectare se reține și id-ul
      // magazinului (necesar pentru asocierea produsului), nu doar eticheta.
      function attachMagazinAutocomplete(
        inputEl,
        listEl,
        hiddenIdEl,
        magazine,
        onSelect,
      ) {
        const items = magazine.map((m) => ({
          id: m.id,
          label: `${m.nume || m.email}${m.filiala ? " - " + m.filiala : ""}`,
        }));
        function clearIdIfMismatch() {
          const match = items.find((it) => it.label === inputEl.value);
          if (!match) {
            hiddenIdEl.value = "";
            if (onSelect) onSelect(null);
          }
        }
        function renderMatches() {
          const q = inputEl.value.trim().toLowerCase();
          if (!q) {
            listEl.classList.add("hidden");
            listEl.innerHTML = "";
            return;
          }
          const matches = items
            .filter((it) => it.label.toLowerCase().includes(q))
            .slice(0, 8);
          if (!matches.length) {
            listEl.classList.add("hidden");
            listEl.innerHTML = "";
            return;
          }
          listEl.innerHTML = matches
            .map(
              (it) =>
                `<div class="magazin-suggestion px-3 py-1.5 hover:bg-slate-100 cursor-pointer">${esc(it.label)}</div>`,
            )
            .join("");
          listEl.classList.remove("hidden");
          listEl.querySelectorAll(".magazin-suggestion").forEach((el, i) => {
            el.addEventListener("mousedown", (e) => {
              e.preventDefault();
              inputEl.value = matches[i].label;
              hiddenIdEl.value = matches[i].id;
              listEl.classList.add("hidden");
              listEl.innerHTML = "";
              if (onSelect)
                onSelect(magazine.find((m) => m.id === matches[i].id));
            });
          });
        }
        inputEl.addEventListener("input", () => {
          clearIdIfMismatch();
          renderMatches();
        });
        inputEl.addEventListener("focus", renderMatches);
        inputEl.addEventListener("blur", () => {
          setTimeout(() => {
            listEl.classList.add("hidden");
          }, 150);
        });
      }

      // Leagă câmpurile de preț (Preț intrare / Adaos / Preț vânzare / Alte
      // costuri / Total / Preț cu TVA) conform regulii dorite:
      // - completarea "Preț de intrare" NU autocompletează Adaos sau Preț vânzare;
      // - completarea "Adaos" adaptează "Preț vânzare" = Preț intrare + Adaos;
      // - completarea "Preț vânzare" adaptează "Adaos" = Preț vânzare - Preț intrare;
      // - "Total fără TVA" și "Preț cu TVA" se calculează automat din Preț
      //   vânzare + Alte costuri, dar rămân necompletate cât timp Preț vânzare
      //   este gol.
      function attachPriceAutoCalc({
        intrareInput,
        vanzareInput,
        adaosInput,
        alteInput,
        totalInput,
        tvaInput,
      }) {
        function updateTotalTva() {
          const vanzareStr = vanzareInput.value.trim();
          if (vanzareStr === "") {
            totalInput.value = "";
            tvaInput.value = "";
            return;
          }
          const vanzare = parseFloat(vanzareStr) || 0;
          const alte = parseFloat(alteInput.value) || 0;
          const total = vanzare + alte;
          totalInput.value = fmtNum(total);
          tvaInput.value = fmtNum(total * (1 + TVA_RATE));
        }
        adaosInput.addEventListener("input", () => {
          const adaosStr = adaosInput.value.trim();
          if (adaosStr !== "") {
            const intrare = parseFloat(intrareInput.value) || 0;
            const adaos = parseFloat(adaosStr) || 0;
            vanzareInput.value = (intrare + adaos).toFixed(2);
          }
          updateTotalTva();
        });
        vanzareInput.addEventListener("input", () => {
          const vanzareStr = vanzareInput.value.trim();
          if (vanzareStr !== "") {
            const intrare = parseFloat(intrareInput.value) || 0;
            const vanzare = parseFloat(vanzareStr) || 0;
            adaosInput.value = (vanzare - intrare).toFixed(2);
          }
          updateTotalTva();
        });
        alteInput.addEventListener("input", updateTotalTva);
        return { updateTotalTva };
      }

      // Construiește harta magazin_id -> nume agent asignat, folosită pentru
      // a completa automat câmpul "Agent" atunci când un produs este
      // trimis/realocat către un magazin care are deja un agent asociat.
      function buildAgentMagazinMap(asocieri, agenti) {
        const map = new Map();
        (asocieri || []).forEach((a) => {
          if (map.has(a.magazin_id)) return;
          const ag = agenti.find((x) => x.id === a.agent_id);
          if (ag) map.set(a.magazin_id, ag.nume || ag.email);
        });
        return map;
      }

      // Construiește harta produs_id -> comanda din care a fost trimis
      // produsul, folosită pentru a afișa numărul comenzii lângă ID-ul
      // produsului trimis și a permite deschiderea comenzii inițiale.
      function buildProdusComandaMap(linii, comenzi) {
        const comenziMap = new Map((comenzi || []).map((c) => [c.id, c]));
        const map = new Map();
        (linii || []).forEach((l) => {
          if (
            l.status_linie === "trimis" &&
            l.produs_id &&
            comenziMap.has(l.comanda_id)
          ) {
            map.set(l.produs_id, comenziMap.get(l.comanda_id));
          }
        });
        return map;
      }

      // Deschide modalul (doar vizualizare) al comenzii inițiale a unui
      // produs trimis către un magazin.
      function deschideComandaInitiala(comanda, linii, profiles) {
        renderComandaReadonlyModal(
          comanda,
          (linii || []).filter((l) => l.comanda_id === comanda.id),
          profiles || [],
        );
      }

      // stocul disponibil, cât și pentru produsele trimise către magazine.

            <th class="px-3 py-3 font-medium">Categorie</th>
            <th class="px-3 py-3 font-medium">Marcă</th>
            <th class="px-3 py-3 font-medium">Culoare</th>

            <th class="px-3 py-3 font-medium">Preț intrare</th>
            <th class="px-3 py-3 font-medium">Preț vânzare</th>
            <th class="px-3 py-3 font-medium">Adaos</th>
            <th class="px-3 py-3 font-medium">Alte costuri</th>
            <th class="px-3 py-3 font-medium">Total fără TVA</th>
            <th class="px-3 py-3 font-medium">Preț cu TVA</th>
            <th class="px-3 py-3 font-medium">Magazin</th>
            <th class="px-3 py-3 font-medium">Telefon</th>
            <th class="px-3 py-3 font-medium">Adresă facturare</th>
            <th class="px-3 py-3 font-medium"></th>
          </tr>
        </thead>
        <tbody>${lista
          .map((p, i) =>
            productRow(
              p,
              i + 1,
              agenti,
              magazine,
              reservedIds.has(p.id),

            ),
          )
          .join("")}</tbody>
      </table>
    </div>`;
      }

      // Tab 1 — Stocul depozitului central (comportament neschimbat).
      function renderStocSubtab(
        container,
        stocDisponibil,
        agenti,
        magazine,
        reservedIds,
        agentMagazinMap,
        marci,
        refresh,
      ) {
        container.innerHTML = `
    <div class="mb-4 flex items-center justify-between gap-3 flex-wrap">
      <p class="text-sm text-slate-500">${stocDisponibil.length} produs${stocDisponibil.length === 1 ? "" : "e"} disponibil${stocDisponibil.length === 1 ? "" : "e"} în stocul depozitului central</p>
      <button id="btn-add-produs" class="btn-primary rounded-lg px-4 py-2 text-sm">+ Adaugă produs nou</button>
    </div>
    ${renderProductsTableHtml(stocDisponibil, agenti, magazine, reservedIds)}`;

        stocDisponibil.forEach((p) =>

        document

            renderAddProductModal(agenti, refresh, null, null, marci);
          });

      // Tab 2 — Produsele trimise către magazine, în forma completă (toate
      // coloanele editabile) din "Depozit central". Un produs poate fi
      // rechemat/realocat schimbând magazinul din câmpul dedicat și apăsând
      // "Salvează" — dispare din stocul magazinului inițial și apare în cel
      // al magazinului nou ales, cu data comenzii, telefonul, adresa de
      // facturare (și agentul, dacă magazinul are unul asociat) actualizate.
      function renderTrimiseSubtab(
        container,
        produseTrimise,
        agenti,
        magazine,
        agentMagazinMap,
        marci,
        refresh,
        comandaCtx,
      ) {

          container.innerHTML = `<div class="bg-white rounded-xl border p-10 text-center" style="border-color:var(--line)"><p class="text-slate-400 text-sm">Niciun produs trimis către magazine încă.</p></div>`;

        }
        container.innerHTML = `
    <div class="mb-4">
      <p class="text-sm text-slate-500">${produseTrimise.length} produs${produseTrimise.length === 1 ? "" : "e"} trimis${produseTrimise.length === 1 ? "" : "e"} către magazine</p>

    ${renderProductsTableHtml(produseTrimise, agenti, magazine, new Set(), comandaCtx ? comandaCtx.map : null)}`;

        produseTrimise.forEach((p) =>
          bindProductRow(
            p,
            agenti,
            magazine,
            agentMagazinMap,

      async function renderDepozitCentral(container) {
        container.innerHTML = `<div class="text-sm text-slate-400">Se încarcă...</div>`;

        const [
          { data: produse, error: prodErr },
          { data: profiles, error: profErr },
          { data: linii, error: liniiErr },
          { data: asocieri, error: asoErr },
          { data: comenzi, error: comErr },
        ] = await Promise.all([
          supa
            .from("produse")
            .select("*")
            .order("created_at", { ascending: true }),
          supa.from("profiles").select("*"),
          supa.from("comanda_produse").select("*"),
          supa.from("agent_magazine").select("*"),
          supa.from("comenzi").select("*"),
          loadTvaRate(),
        ]);

        if (prodErr) {
          container.innerHTML = `<div class="text-red-600 text-sm">Eroare la încărcarea stocului: ${esc(prodErr.message)}</div>`;
          return;
        }
        if (profErr) {
          container.innerHTML = `<div class="text-red-600 text-sm">Eroare la încărcarea profilurilor: ${esc(profErr.message)}</div>`;
          return;
        }
        if (liniiErr) {
          container.innerHTML = `<div class="text-red-600 text-sm">Eroare la încărcarea comenzilor: ${esc(liniiErr.message)}</div>`;
          return;
        }

        const agenti = (profiles || []).filter((p) => p.role === "agent");
        const magazine = (profiles || []).filter((p) => p.role === "magazin");
        const agentMagazinMap = buildAgentMagazinMap(
          asoErr ? [] : asocieri,
          agenti,
        );
        const marci = distinctMarci([...(produse || []), ...(linii || [])]);
        const produsComandaMap = buildProdusComandaMap(
          linii,
          comErr ? [] : comenzi,
        );
        const comandaCtx = {
          map: produsComandaMap,
          linii: linii || [],
          profiles: profiles || [],
        };

        // Produsele deja trimise către un magazin sau marcate "Vânzare
        // directă" (comandă onorată sau alocare manuală) nu mai fac parte
        // din stocul disponibil — sunt afișate în tab-ul separat "Produse
        // trimise către magazine".
        const stocDisponibil = (produse || []).filter(
          (p) => !p.magazin_id && !p.vanzare_directa,
        );
        const produseTrimise = (produse || []).filter(
          (p) => p.magazin_id || p.vanzare_directa,
        );

        // Produse legate de o linie de comandă "pregătită" (rezervate), dar
        // încă netrimise — trebuie marcate distinct în lista de stoc.
        const reservedIds = new Set(
          (linii || [])
            .filter((l) => l.status_linie === "asignat" && l.produs_id)
            .map((l) => l.produs_id),
        );

        const tvaProcentCurent = Math.round(TVA_RATE * 10000) / 100;

        container.innerHTML = `
    <div class="mb-4 flex items-center justify-between gap-3 flex-wrap">
      <div class="flex gap-2">
        <button id="depozit-tab-stoc" class="depozit-subtab-btn rounded-lg px-4 py-2 text-sm font-medium border" style="border-color:var(--line)">Stocul depozitului central</button>
        <button id="depozit-tab-trimise" class="depozit-subtab-btn rounded-lg px-4 py-2 text-sm font-medium border" style="border-color:var(--line)">Produse trimise către magazine (${produseTrimise.length})</button>
      </div>
      <div class="flex items-center gap-2 text-sm">
        <label for="tva-procent-input" class="text-slate-500">TVA (%)</label>
        <input id="tva-procent-input" type="number" step="0.01" min="0" value="${tvaProcentCurent}" class="border rounded-md px-2 py-1.5 text-sm w-20" title="Cotă TVA folosită la calculul automat al 'Preț cu TVA' pentru produse noi sau editate. Nu recalculează retroactiv produsele deja salvate.">
        <button id="btn-salveaza-tva" class="rounded-md px-3 py-1.5 text-sm font-medium border" style="border-color:var(--line)">Salvează</button>
      </div>
    </div>
    <div id="depozit-subtab-content"></div>`;

        const sub = document.getElementById("depozit-subtab-content");
        const btnStoc = document.getElementById("depozit-tab-stoc");
        const btnTrimise = document.getElementById("depozit-tab-trimise");
        const refresh = () => renderDepozitCentral(container);
        function activate(which) {
          btnStoc.classList.toggle("btn-primary", which === "stoc");
          btnTrimise.classList.toggle("btn-primary", which === "trimise");
          if (which === "stoc") {
            renderStocSubtab(
              sub,
              stocDisponibil,
              agenti,
              magazine,
              reservedIds,
              agentMagazinMap,
              marci,
              refresh,
            );
          } else {
            renderTrimiseSubtab(
              sub,
              produseTrimise,
              agenti,
              magazine,
              agentMagazinMap,
              marci,
              refresh,
              comandaCtx,
            );
          }
        }
        btnStoc.addEventListener("click", () => activate("stoc"));
        btnTrimise.addEventListener("click", () => activate("trimise"));
        activate("stoc");

        document
          .getElementById("btn-salveaza-tva")
          .addEventListener("click", async () => {
            const btn = document.getElementById("btn-salveaza-tva");
            const input = document.getElementById("tva-procent-input");
            const procent = parseFloat(input.value);
            if (isNaN(procent) || procent < 0) {
              toast("Introdu un procent de TVA valid.", true);
              return;
            }
            btn.disabled = true;
            btn.textContent = "Se salvează...";
            const { error } = await saveTvaRate(procent);
            btn.disabled = false;
            btn.textContent = "Salvează";
            if (error) {
              toast("Eroare la salvarea TVA: " + error.message, true);
              return;
            }
            toast(
              `TVA actualizat la ${procent}%. Se aplică produselor noi sau editate ulterior.`,
            );
          });
      }

        ${isReserved ? `<span class="inline-block px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-amber-100 text-amber-700" title="Legat de o comandă, în așteptare de trimitere">Rezervat</span>` : ""}
        ${comandaInfo ? `<button type="button" class="comanda-produs-link inline-block px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-slate-100 text-slate-600 underline decoration-dotted hover:text-[var(--teal-dark)]" title="Deschide comanda inițială">${esc(comandaInfo.numar_comanda)}</button>` : ""}
      </div>
    </td>
    <td class="px-3 py-3">
      <div class="relative">
        <input type="text" data-field="agent" value="${esc(p.agent || "")}" placeholder="Caută agent..." autocomplete="off" class="agent-input border rounded-md px-2 py-1.5 text-xs w-28">
        <div class="agent-suggestions hidden absolute z-10 left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg max-h-32 overflow-y-auto text-xs" style="border-color:var(--line)"></div>
      </div>
    </td>
    <td class="px-3 py-3 text-xs text-slate-500 data-comenzii-cell">${p.data_comenzii ? new Date(p.data_comenzii).toLocaleDateString("ro-RO") : "—"}</td>
    <td class="px-3 py-3">
      <div class="categorie-wrap relative w-32">
        <select data-field="categorie" class="categorie-select border rounded-md px-2 py-1.5 text-xs w-32 ${categorieCustom ? "hidden" : ""}">
          <option value="">—</option>
          ${categorieOptions}
          <option value="__alta__">Altă categorie</option>
        </select>
        <div class="categorie-alta-wrap flex items-center gap-1 ${categorieCustom ? "" : "hidden"}">
          <input type="text" data-field="categorie_alta" class="categorie-alta-input border rounded-md px-2 py-1.5 text-xs w-24" placeholder="Specifică" value="${categorieCustom ? esc(p.categorie) : ""}">
          <button type="button" class="categorie-alta-back text-slate-400 hover:text-slate-600 text-xs" title="Alege din listă">↺</button>

    <td class="px-3 py-3">

      function bindProductRow(
        p,
        agenti,
        magazine,
        agentMagazinMap,
        marci,
        refresh,
        comandaCtx,
      ) {
        const row = document.querySelector(`tr[data-prow="${p.id}"]`);
        if (!row) return;

        row.querySelector(".produs-id-link").addEventListener("click", () => {
          renderEditProductModal(p, agenti, magazine, refresh, marci);
        });

        const comandaLink = row.querySelector(".comanda-produs-link");
        if (comandaLink && comandaCtx) {
          comandaLink.addEventListener("click", () => {
            const comanda = comandaCtx.map.get(p.id);
            if (comanda) {
              deschideComandaInitiala(
                comanda,
                comandaCtx.linii,
                comandaCtx.profiles,
              );
            }
          });
        }

        const agentInput = row.querySelector(".agent-input");
        attachAgentAutocomplete(
          agentInput,
          row.querySelector(".agent-suggestions"),
          agenti.map((a) => a.nume || a.email),
        );

        attachAgentAutocomplete(
          row.querySelector(".marca-input"),
          row.querySelector(".marca-suggestions"),
          marci,
        );

        const catSelect = row.querySelector(".categorie-select");
        const catAltaWrap = row.querySelector(".categorie-alta-wrap");
        const catAlta = row.querySelector(".categorie-alta-input");
        catSelect.addEventListener("change", () => {
          if (catSelect.value === "__alta__") {
            catSelect.classList.add("hidden");
            catAltaWrap.classList.remove("hidden");
            catAlta.value = "";
            catAlta.focus();
          }
        });
        row
          .querySelector(".categorie-alta-back")
          .addEventListener("click", () => {
            catAltaWrap.classList.add("hidden");
            catSelect.classList.remove("hidden");
            catSelect.value = "";
            catAlta.value = "";
          });

        const intrareInput = row.querySelector('[data-field="pret_intrare"]');
        const vanzareInput = row.querySelector('[data-field="pret_vanzare"]');
        const alteInput = row.querySelector('[data-field="alte_costuri"]');
        const adaosInput = row.querySelector(".adaos-input");
        const totalInput = row.querySelector(".total-input");
        const tvaInput = row.querySelector(".tva-input");
        attachPriceAutoCalc({
          intrareInput,
          vanzareInput,
          adaosInput,
          alteInput,
          totalInput,
          tvaInput,
        });

        const magazinInput = row.querySelector(".magazin-input");
        const magazinIdInput = row.querySelector(".magazin-id-input");
        const telefonCell = row.querySelector(".telefon-cell");
        const adresaCell = row.querySelector(".adresa-cell");
        attachMagazinAutocomplete(
          magazinInput,
          row.querySelector(".magazin-suggestions"),
          magazinIdInput,
          magazine,
          (m) => {
            telefonCell.textContent = m ? m.telefon || "—" : "—";
            adresaCell.textContent = m ? m.adresa_facturare || "—" : "—";
            adresaCell.title = m ? m.adresa_facturare || "" : "";
            // La alegerea unui magazin care are deja un agent asociat,
            // completează automat câmpul Agent (poate fi suprascris manual).
            if (m && agentMagazinMap.has(m.id)) {
              agentInput.value = agentMagazinMap.get(m.id);
            }
          },
        );

        row
          .querySelector(".save-produs-btn")
          .addEventListener("click", async () => {
            const btn = row.querySelector(".save-produs-btn");
            btn.disabled = true;
            btn.textContent = "Se salvează...";

            const agentVal =
              row.querySelector('[data-field="agent"]').value.trim() || null;
            const categorieVal = !catAltaWrap.classList.contains("hidden")
              ? catAlta.value.trim() || null
              : catSelect.value || null;
            const intrare = parseFloat(intrareInput.value) || null;
            const vanzare = parseFloat(vanzareInput.value) || null;
            const alte = parseFloat(alteInput.value) || 0;
            const adaos = adaosInput.value.trim()
              ? parseFloat(adaosInput.value)
              : null;
            const total = totalInput.value.trim()
              ? parseFloat(totalInput.value)
              : null;
            const cuTva = tvaInput.value.trim()
              ? parseFloat(tvaInput.value)
              : null;
            const magazinId = magazinIdInput.value || null;
            const magazinInputVal = magazinInput.value.trim();
            const magazinProfil = magazine.find((m) => m.id === magazinId);
            // Câmpul "Magazin" a fost golit (nici id, nici text) — folosit
            // și pentru cazul "Vânzare directă", unde magazin_id era deja
            // null, deci simpla comparație de id nu ar detecta schimbarea.
            const campMagazinGolit = !magazinId && !magazinInputVal;
            // Reasignare/realocare: magazinul (sau marcajul "Vânzare directă")
            // s-a schimbat față de cel salvat anterior.
            const magazinSchimbat =
              magazinId !== (p.magazin_id || null) ||
              (!!p.vanzare_directa && campMagazinGolit);
            // Retragere: produsul era deja trimis (magazin real sau "Vânzare
            // directă") și acum câmpul "Magazin" a fost golit și salvat —
            // produsul revine în stocul depozitului central, iar mențiunea
            // "Trimis" de pe comanda inițială devine "Realocat".
            const eraTrimis = !!(p.magazin_id || p.vanzare_directa);
            const esteRetragere = campMagazinGolit && eraTrimis;

            const payload = {
              agent: esteRetragere ? null : agentVal,
              categorie: categorieVal,
              marca:
                row.querySelector('[data-field="marca"]').value.trim() || null,
              culoare:
                row.querySelector('[data-field="culoare"]').value.trim() ||
                null,
              vin: row.querySelector('[data-field="vin"]').value.trim() || null,
              pret_intrare: intrare,
              pret_vanzare: vanzare,
              adaos,
              alte_costuri: alte,
              total_fara_tva: total,
              pret_cu_tva: cuTva,
              magazin_id: magazinId,
              telefon: esteRetragere
                ? null
                : magazinProfil
                  ? magazinProfil.telefon || null
                  : p.telefon || null,
              adresa_facturare: esteRetragere
                ? null
                : magazinProfil
                  ? magazinProfil.adresa_facturare || null
                  : p.adresa_facturare || null,
              updated_at: new Date().toISOString(),
            };
            // La orice schimbare a câmpului Magazin (alegere de magazin nou
            // sau golire), produsul nu mai este o "Vânzare directă" — acel
            // marcaj se aplică doar prin fluxul de onorare a comenzii.
            if (magazinSchimbat) {
              payload.vanzare_directa = false;
            }
            if (esteRetragere) {
              payload.data_comenzii = null;
            } else if (magazinId && magazinSchimbat) {
              // Data comenzii se actualizează la prima trimitere și la orice
              // realocare ulterioară către un magazin diferit.
              payload.data_comenzii = new Date().toISOString().slice(0, 10);
            }

            const { error } = await supa
              .from("produse")
              .update(payload)
              .eq("id", p.id);

            if (error) {
              btn.disabled = false;
              btn.textContent = "Salvează";
              toast("Eroare: " + error.message, true);
              return;
            }

            if (esteRetragere) {
              // Comanda inițială care a trimis acest produs către magazin
              // este marcată acum "Realocat" în loc de "Trimis", iar
              // statusul general al comenzii este recalculat.
              const { data: liniiRealocate } = await supa
                .from("comanda_produse")
                .update({ status_linie: "realocat" })
                .eq("produs_id", p.id)
                .eq("status_linie", "trimis")
                .select();
              const comenziAfectate = new Set(
                (liniiRealocate || []).map((l) => l.comanda_id),
              );
              for (const comandaId of comenziAfectate) {
                const { data: toateLiniile } = await supa
                  .from("comanda_produse")
                  .select("status_linie")
                  .eq("comanda_id", comandaId);
                await supa
                  .from("comenzi")
                  .update({
                    status: computeComandaStatus(toateLiniile || []),
                    updated_at: new Date().toISOString(),
                  })
                  .eq("id", comandaId);
              }
            }

            btn.disabled = false;
            btn.textContent = "Salvează";

            Object.assign(p, payload);
            toast("Produs salvat cu succes.");
            if (magazinSchimbat) {
              // Produsul tocmai a fost trimis/realocat/retras — se mută (sau
              // se schimbă) secțiunea în care apare.
              refresh();
              return;
            }
            if (payload.data_comenzii) {
              row.querySelector(".data-comenzii-cell").textContent = new Date(
                payload.data_comenzii,
              ).toLocaleDateString("ro-RO");
            }
          });

        row
          .querySelector(".delete-produs-btn")
          .addEventListener("click", async () => {
            const ok = confirm(
              `Ștergi definitiv produsul ${p.id_produs}? Acțiunea nu poate fi anulată.`,
            );
            if (!ok) return;
            const btn = row.querySelector(".delete-produs-btn");
            btn.disabled = true;
            btn.textContent = "Se șterge...";
            const { error } = await supa
              .from("produse")
              .delete()
              .eq("id", p.id);
            if (error) {
              toast("Eroare la ștergere: " + error.message, true);
              btn.disabled = false;
              btn.textContent = "Șterge";
              return;
            }
            toast("Produs șters din stoc.");
            row.remove();
          });
      }
