              msg.className = "text-sm text-center text-red-600";
              msg.textContent = "Alege sau specifică o categorie.";
              return;
            }
            const agentVal =
              document.getElementById("edit-agent").value.trim() || null;

            const intrare = parseFloat(editIntrare.value) || null;
            const vanzare = parseFloat(editVanzare.value) || null;
            const alte = parseFloat(editAlte.value) || 0;
            const adaos = editAdaos.value.trim()
              ? parseFloat(editAdaos.value)
              : null;
            const total = editTotal.value.trim()
              ? parseFloat(editTotal.value)
              : null;
            const cuTva = editTva.value.trim()
              ? parseFloat(editTva.value)
              : null;

            btn.disabled = true;
            btn.textContent = "Se salvează...";

            const { error } = await supa
              .from("produse")
              .update({
                agent: agentVal,
                categorie: categorieVal,
                marca:
                  document.getElementById("edit-marca").value.trim() || null,
                culoare:
                  document.getElementById("edit-culoare").value.trim() || null,
                vin: document.getElementById("edit-vin").value.trim() || null,
                pret_intrare: intrare,
                pret_vanzare: vanzare,
                alte_costuri: alte,
                adaos,
                total_fara_tva: total,
                pret_cu_tva: cuTva,
                updated_at: new Date().toISOString(),
              })
              .eq("id", p.id);

            if (error) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = error.message;
              btn.disabled = false;
              btn.textContent = "Salvează modificările";
              return;
            }

            overlay.remove();
            toast("Produsul a fost actualizat cu succes.");
            onSaved();
          });
      }

      // ==================================================================
      // COMENZI — flux Agent (sau Admin manual) → Admin pregătește/leagă
      // produse din stoc → trimite produsele pregătite către Magazin.
      // ==================================================================
      const STATUS_COMANDA_LABEL = {
        in_asteptare: "În așteptare",
        partial_onorata: "Parțial onorată",
        onorata: "Onorată",
        anulata: "Anulată",
      };

      function statusBadge(status) {
        const map = {
          in_asteptare: "bg-amber-50 text-amber-700",
          partial_onorata: "bg-blue-50 text-blue-700",
          onorata: "bg-emerald-50 text-emerald-700",
          anulata: "bg-red-50 text-red-600",
        };
        const cls = map[status] || "bg-slate-100 text-slate-500";
        return `<span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${esc(STATUS_COMANDA_LABEL[status] || status)}</span>`;
      }

      function lineStatusLabel(s) {
        if (s === "trimis") return "Trimis";
        if (s === "realocat") return "Realocat";
        if (s === "asignat") return "Pregătit (rezervat)";
        return "Neasignat";
      }

      function computeComandaStatus(lines) {
        if (!lines.length) return "in_asteptare";
        const allTrimis = lines.every((l) => l.status_linie === "trimis");
        const anyTrimis = lines.some((l) => l.status_linie === "trimis");
        if (allTrimis) return "onorata";
        if (anyTrimis) return "partial_onorata";
        return "in_asteptare";
      }

      // Numărul de comandă are formatul C{AA}-XXXX, unde AA sunt ultimele
      // două cifre ale anului curent (ex: C26-0001 în 2026, C27-0001 în
      // 2027 ș.a.m.d.), iar XXXX este un număr de ordine (0001-9999) care
      // repornește de la 1 în fiecare an nou. Comenzile din anii anteriori
      // (fie cu prefixul vechi "COM-", fie cu un prefix "C{AA}-" diferit)
      // nu sunt luate în calcul la determinarea următorului număr.
      async function nextOrderNumber() {
        const sufixAn = String(new Date().getFullYear()).slice(-2);
        const prefix = `C${sufixAn}-`;
        const { data } = await supa.from("comenzi").select("numar_comanda");
        let max = 0;
        (data || []).forEach((c) => {
          const numar = c.numar_comanda || "";
          if (!numar.startsWith(prefix)) return;
          const m = new RegExp(`^${prefix}(\\d+)$`).exec(numar);
          if (m) max = Math.max(max, parseInt(m[1], 10));
        });
        return prefix + String(max + 1).padStart(4, "0");
      }

      // Inserează o comandă nouă generând numărul de comandă (C{AA}-XXXX).
      // Dacă două trimiteri aproape simultane calculează același număr
      // "următor" (condiție de cursă client-side), inserarea a doua eșuează
      // cu eroare de constrângere UNIQUE pe numar_comanda. În acest caz se
      // recalculează automat un număr nou (proaspăt, ținând cont de comanda
      // deja salvată) și se reîncearcă, fără ca eroarea să ajungă la utilizator.
      async function insertComandaCuNumarUnic(
        payloadFaraNumar,
        maxIncercari = 5,
      ) {
        let ultimaEroare = null;
        for (let incercare = 0; incercare < maxIncercari; incercare++) {
          const numarComanda = await nextOrderNumber();
          const { data, error } = await supa
            .from("comenzi")
            .insert({ ...payloadFaraNumar, numar_comanda: numarComanda })
            .select()
            .single();
          if (!error) {
            return { data, error: null, numarComanda };
          }
          ultimaEroare = error;
          const esteDuplicatNumarComanda =
            error.code === "23505" && /numar_comanda/.test(error.message || "");
          if (!esteDuplicatNumarComanda) {
            return { data: null, error, numarComanda: null };
          }
          // Altfel: se reîncearcă automat cu un număr recalculat.
        }
        return { data: null, error: ultimaEroare, numarComanda: null };
      }

      // Editor reutilizabil pentru liniile (produsele cerute) unei comenzi noi.
      function renderComandaLinesEditor(containerEl, marci) {
        let lineCount = 0;
        function addLineRow() {
          lineCount++;
          const div = document.createElement("div");
          div.className =
            "comanda-line-row grid grid-cols-12 gap-2 items-start border rounded-lg p-2";
          div.style.borderColor = "var(--line)";
          const categorieOptions = CATEGORII_PRODUS.map(
            (c) => `<option value="${esc(c)}">${esc(c)}</option>`,
          ).join("");
          div.innerHTML = `
      <div class="col-span-3">
        <select class="line-categorie ${inputBase()} text-xs">
          <option value="">Categorie...</option>
          ${categorieOptions}
          <option value="__alta__">Altă categorie</option>
        </select>
        <div class="line-categorie-alta-wrap hidden flex items-center gap-1 mt-1">
          <input type="text" class="line-categorie-alta ${inputBase()} text-xs" placeholder="Specifică">
          <button type="button" class="line-categorie-alta-back text-slate-400 hover:text-slate-600 text-xs shrink-0" title="Alege din listă">↺</button>
        </div>
      </div>
      <div class="col-span-3 relative">
        <input type="text" class="line-marca ${inputBase()} text-xs" placeholder="Marcă" autocomplete="off">
        <div class="line-marca-suggestions agent-suggestions hidden absolute z-10 left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg max-h-32 overflow-y-auto text-xs" style="border-color:var(--line)"></div>
      </div>
      <div class="col-span-3"><input type="text" class="line-culoare ${inputBase()} text-xs" placeholder="Culoare"></div>
      <div class="col-span-2">
        <label class="text-[10px] text-slate-400 block mb-0.5 leading-none">Cantitate</label>
        <input type="number" min="1" value="1" class="line-cantitate ${inputBase()} text-xs px-2 text-center">
      </div>
      <div class="col-span-1 flex justify-end pt-4"><button type="button" class="line-remove text-red-500 hover:text-red-700 text-sm" title="Șterge linia">✕</button></div>`;
          containerEl.appendChild(div);

          const catSelect = div.querySelector(".line-categorie");
          const catAltaWrap = div.querySelector(".line-categorie-alta-wrap");
          const catAlta = div.querySelector(".line-categorie-alta");
          catSelect.addEventListener("change", () => {
            if (catSelect.value === "__alta__") {
              catSelect.classList.add("hidden");
              catAltaWrap.classList.remove("hidden");
              catAlta.value = "";
              catAlta.focus();
            }
          });
          div
            .querySelector(".line-categorie-alta-back")
            .addEventListener("click", () => {
              catAltaWrap.classList.add("hidden");
              catSelect.classList.remove("hidden");
              catSelect.value = "";
              catAlta.value = "";
            });
          attachAgentAutocomplete(
            div.querySelector(".line-marca"),
            div.querySelector(".line-marca-suggestions"),
            marci || [],
          );
          div.querySelector(".line-remove").addEventListener("click", () => {
            div.remove();
          });
        }
        addLineRow();
        return {
          addLineRow,
          getLines() {
            return Array.from(containerEl.querySelectorAll(".comanda-line-row"))
              .map((div) => {
                const catSelect = div.querySelector(".line-categorie");
                const catAltaWrap = div.querySelector(
                  ".line-categorie-alta-wrap",
                );
                const catAlta = div.querySelector(".line-categorie-alta");
                const categorie = !catAltaWrap.classList.contains("hidden")
                  ? catAlta.value.trim()
                  : catSelect.value;
                return {
                  categorie: categorie || null,
                  marca: div.querySelector(".line-marca").value.trim() || null,
                  culoare:
                    div.querySelector(".line-culoare").value.trim() || null,
                  cantitate:
                    parseInt(div.querySelector(".line-cantitate").value, 10) ||
                    1,
                };
              })
              .filter((l) => l.categorie || l.marca || l.culoare);
          },
        };
      }

      // ------------------------------------------------------------------
      // MODAL: comandă nouă (folosit de Agent pentru el însuși, sau de Admin
      // care introduce manual o comandă telefonică pentru un agent fără cont)
      // ------------------------------------------------------------------
      function renderNewComandaModal(mode, context, onSaved) {
        const overlay = document.createElement("div");
        overlay.id = "new-comanda-overlay";
        overlay.className =
          "fixed inset-0 z-40 flex items-center justify-center px-4 py-8 overflow-y-auto";
        overlay.style.background = "rgba(15,20,25,0.55)";

        const magazineList =
          mode === "admin" ? context.magazine : context.magazineAsignate;
        const magazinOptionsHtml = magazineList
          .map(
            (m) =>
              `<option value="${m.id}">${esc(m.nume || m.email)}${m.filiala ? " - " + esc(m.filiala) : ""}</option>`,
          )
          .join("");

        overlay.innerHTML = `
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-2xl fade-in my-auto">
      <h2 class="text-lg font-bold mb-1">Comandă nouă</h2>
      <p class="text-sm text-slate-500 mb-5">Adaugă produsele cerute; Adminul le va pregăti din depozitul central.</p>
      <form id="form-new-comanda" class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            ${fieldLabel("Magazin")}
            <select id="comanda-magazin" class="${inputBase()}" required>
              <option value="">Alege magazinul...</option>
              ${mode === "admin" ? `<option value="${VANZARE_DIRECTA}">Vânzare directă</option>` : ""}
              ${magazinOptionsHtml}
            </select>
          </div>
          ${
            mode === "admin"
              ? `<div>
            ${fieldLabel("Agent")}
            <div class="relative">
              <input type="text" id="comanda-agent" class="${inputBase()}" placeholder="Caută sau scrie numele agentului" autocomplete="off">
              <div id="comanda-agent-suggestions" class="agent-suggestions hidden absolute z-10 left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg max-h-40 overflow-y-auto text-sm" style="border-color:var(--line)"></div>
            </div>
          </div>`
              : ""
          }
        </div>
        <div>
          ${fieldLabel("Produse cerute")}
          <div id="comanda-lines" class="space-y-2"></div>
          <button type="button" id="comanda-add-line" class="mt-2 text-xs font-medium underline" style="color:var(--teal-dark)">+ Adaugă produs</button>
        </div>
        <div>${fieldLabel("Observații (opțional)")}<textarea id="comanda-observatii" rows="2" class="${inputBase()}"></textarea></div>
        <div class="flex gap-2 pt-1">
          <button type="button" id="comanda-cancel" class="flex-1 rounded-lg py-2.5 text-sm font-medium border" style="border-color:var(--line)">Anulează</button>
          <button type="submit" class="flex-1 btn-primary rounded-lg py-2.5 text-sm">Trimite comanda</button>
        </div>
        <p id="comanda-msg" class="text-sm text-center"></p>
      </form>
    </div>`;
        document.body.appendChild(overlay);

        document
          .getElementById("comanda-cancel")
          .addEventListener("click", () => overlay.remove());
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) overlay.remove();
        });

        if (mode === "admin") {
          attachAgentAutocomplete(
            document.getElementById("comanda-agent"),
            document.getElementById("comanda-agent-suggestions"),
            context.agenti.map((a) => a.nume || a.email),
          );
        }

        const linesContainer = document.getElementById("comanda-lines");
        const editor = renderComandaLinesEditor(linesContainer, context.marci);
        document
          .getElementById("comanda-add-line")
          .addEventListener("click", () => editor.addLineRow());

        document
          .getElementById("form-new-comanda")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const msg = document.getElementById("comanda-msg");
            const btn = e.target.querySelector('button[type="submit"]');

            const magazinId = document.getElementById("comanda-magazin").value;
            if (!magazinId) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = "Alege magazinul pentru care se face comanda.";
              return;
            }
            const lines = editor.getLines();
            if (!lines.length) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = "Adaugă cel puțin un produs în comandă.";
              return;
            }

            const agentVal =
              mode === "admin"
                ? document.getElementById("comanda-agent").value.trim() || null
                : currentProfile.nume || currentProfile.email;

            btn.disabled = true;
            btn.textContent = "Se trimite...";

            const esteVanzareDirecta =
              mode === "admin" && magazinId === VANZARE_DIRECTA;
            const numarComandaPayload = {
              magazin_id: esteVanzareDirecta ? null : magazinId,
              vanzare_directa: esteVanzareDirecta,
              agent: agentVal,
              creat_de: currentUser.id,
              status: "in_asteptare",
              observatii:
                document.getElementById("comanda-observatii").value.trim() ||
                null,
            };
            const {
              data: comanda,
              error: comErr,
              numarComanda,
            } = await insertComandaCuNumarUnic(numarComandaPayload);

            if (comErr) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = comErr.message;
              btn.disabled = false;
              btn.textContent = "Trimite comanda";
              return;
            }

            const { error: liniiErr } = await supa
              .from("comanda_produse")
              .insert(
                lines.flatMap((l) =>
                  Array.from({ length: l.cantitate }, () => ({
                    comanda_id: comanda.id,
                    categorie: l.categorie,
                    marca: l.marca,
                    culoare: l.culoare,
                    cantitate: 1,
                    status_linie: "neasignat",
                  })),
                ),
              );

            if (liniiErr) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = liniiErr.message;
              btn.disabled = false;
              btn.textContent = "Trimite comanda";
              return;
            }

            overlay.remove();
            toast(`Comanda ${numarComanda} a fost creată.`);
            onSaved();
          });
      }

      // ------------------------------------------------------------------
      // Card scurt pentru o comandă (folosit în toate listele: admin/agent/magazin)
      // ------------------------------------------------------------------
      function comandaCard(c, lines, magazine) {
        const m = magazine.find((x) => x.id === c.magazin_id);
        const magazinLabel = m
          ? `${m.nume || m.email}${m.filiala ? " - " + m.filiala : ""}`
          : c.vanzare_directa
            ? "Vânzare directă"
            : "—";
        const status =
          c.status === "anulata" ? "anulata" : computeComandaStatus(lines);
        return `
  <div class="bg-white rounded-xl border p-4 flex items-center justify-between gap-3 flex-wrap" style="border-color:var(--line)">
    <div>
      <div class="font-semibold text-sm">${esc(c.numar_comanda)} <span class="text-slate-400 font-normal">— ${esc(magazinLabel)}</span></div>
      <div class="text-xs text-slate-400 mt-0.5">Agent: ${esc(c.agent || "—")} · ${new Date(c.created_at).toLocaleDateString("ro-RO")} · ${lines.length} produs${lines.length === 1 ? "" : "e"}</div>
    </div>
    <div class="flex items-center gap-2">
      ${statusBadge(status)}
      <button data-open-comanda="${c.id}" class="rounded-md px-3 py-1.5 text-xs font-semibold border" style="border-color:var(--line)">Deschide</button>
    </div>
  </div>`;
      }

      // ------------------------------------------------------------------
      // MODAL: alege un produs existent (neasignat, nerezervat) din stoc
      // pentru a-l lega de o linie de comandă.
      // ------------------------------------------------------------------
      function renderPickProductModal(l, context, onPick) {
        const overlay = document.createElement("div");
        overlay.id = "pick-produs-overlay";
        overlay.className =
          "fixed inset-0 z-50 flex items-center justify-center px-4 py-8 overflow-y-auto";
        overlay.style.background = "rgba(15,20,25,0.55)";

        const reserved = new Set(
          context.allLinii
            .filter((x) => x.produs_id && x.id !== l.id)
            .map((x) => x.produs_id),
        );
        const available = context.produse.filter(
          (p) => !p.magazin_id && !reserved.has(p.id),
        );

        overlay.innerHTML = `
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-lg fade-in my-auto">
      <h2 class="text-lg font-bold mb-1">Alege produsul din stoc</h2>
      <p class="text-sm text-slate-500 mb-3">Se cere: ${esc(l.categorie || "—")}${l.marca ? " · " + esc(l.marca) : ""}${l.culoare ? " · " + esc(l.culoare) : ""}</p>
      <input type="text" id="pick-produs-search" class="${inputBase()} mb-3" placeholder="Caută după categorie, marcă, culoare, VIN...">
      <div id="pick-produs-list" class="space-y-1.5 max-h-72 overflow-y-auto"></div>
      <button type="button" id="pick-produs-cancel" class="w-full mt-4 rounded-lg py-2.5 text-sm font-medium border" style="border-color:var(--line)">Anulează</button>
    </div>`;
        document.body.appendChild(overlay);

        document
          .getElementById("pick-produs-cancel")
          .addEventListener("click", () => overlay.remove());
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) overlay.remove();
        });

        const listEl = document.getElementById("pick-produs-list");
        function paint(filterQ) {
          const q = (filterQ || "").trim().toLowerCase();
          const filtered = !q
            ? available
            : available.filter((p) =>
                [p.categorie, p.marca, p.culoare, p.vin, p.id_produs]
                  .filter(Boolean)
                  .some((v) => v.toLowerCase().includes(q)),
              );
          if (!filtered.length) {
            listEl.innerHTML = `<p class="text-sm text-slate-400 text-center py-6">Niciun produs disponibil în stoc.</p>`;
            return;
          }
          listEl.innerHTML = filtered
            .map(
              (p) => `
      <button type="button" data-pick="${p.id}" class="pick-produs-item w-full text-left border rounded-lg px-3 py-2 text-sm hover:bg-slate-50" style="border-color:var(--line)">
        <div class="font-medium">${esc(p.categorie || "—")} · ${esc(p.marca || "—")} · ${esc(p.culoare || "—")}</div>
        <div class="text-xs text-slate-400 font-mono">${esc(p.id_produs)}${p.vin ? " · VIN " + esc(p.vin) : ""}</div>
      </button>`,
            )
            .join("");
          listEl.querySelectorAll(".pick-produs-item").forEach((btn) => {
            btn.addEventListener("click", () => {
              const produs = available.find((p) => p.id === btn.dataset.pick);
              overlay.remove();
              onPick(produs);
            });
          });
        }
        paint("");
        document
          .getElementById("pick-produs-search")
          .addEventListener("input", (e) => paint(e.target.value));
      }

      // ------------------------------------------------------------------
      // O linie din detaliul comenzii (varianta editabilă, pentru Admin)
      // ------------------------------------------------------------------
      function comandaLineRow(l, context) {
        const produs = l.produs_id
          ? context.produse.find((p) => p.id === l.produs_id)
          : null;
        return `
  <div class="border rounded-lg p-3 flex items-center justify-between gap-3 flex-wrap" style="border-color:var(--line)" data-linie="${l.id}">
    <div class="text-sm">
      <div class="font-medium">${esc(l.categorie || "—")}${l.marca ? " · " + esc(l.marca) : ""}${l.culoare ? " · " + esc(l.culoare) : ""}</div>
      <div class="text-xs text-slate-400">Cantitate: ${l.cantitate}</div>
      ${produs ? `<div class="text-xs text-emerald-700 mt-1">Legat de produsul ${esc(produs.id_produs)}${produs.vin ? " · VIN " + esc(produs.vin) : ""}</div>` : ""}
    </div>
    <div class="flex items-center gap-2">
      <span class="text-xs font-medium ${l.status_linie === "trimis" ? "text-emerald-700" : l.status_linie === "realocat" ? "text-red-600" : l.status_linie === "asignat" ? "text-blue-700" : "text-amber-700"}">${esc(lineStatusLabel(l.status_linie))}</span>
      ${
        l.status_linie === "trimis"
          ? ""
          : `<button data-link-line="${l.id}" class="rounded-md px-3 py-1.5 text-xs font-semibold border" style="border-color:var(--line)">${produs ? "Schimbă produsul" : "Leagă produs"}</button>
             <button data-newprod-line="${l.id}" class="rounded-md px-3 py-1.5 text-xs font-semibold bg-slate-100 hover:bg-slate-200">+ Produs nou</button>`
      }
    </div>
  </div>`;
      }

      function bindComandaLineRow(l, context, paintLines, overlay, agenti) {
        const row = overlay.querySelector(`[data-linie="${l.id}"]`);
        if (!row) return;
        const linkBtn = row.querySelector(`[data-link-line="${l.id}"]`);
        if (linkBtn) {
          linkBtn.addEventListener("click", () => {
            renderPickProductModal(l, context, async (produs) => {
              await supa
                .from("comanda_produse")
                .update({ produs_id: produs.id, status_linie: "asignat" })
                .eq("id", l.id);
              l.produs_id = produs.id;
              l.status_linie = "asignat";
              paintLines();
            });
          });
        }
        const newProdBtn = row.querySelector(`[data-newprod-line="${l.id}"]`);
        if (newProdBtn) {
          newProdBtn.addEventListener("click", () => {
            renderAddProductModal(
              agenti,
              () => {},
              async (produsNou) => {
                await supa
                  .from("comanda_produse")
                  .update({ produs_id: produsNou.id, status_linie: "asignat" })
                  .eq("id", l.id);
                l.produs_id = produsNou.id;
                l.status_linie = "asignat";
                context.produse.push(produsNou);
                paintLines();
              },
              { categorie: l.categorie, marca: l.marca, culoare: l.culoare },
              distinctMarci(context.produse),
            );
          });
        }
      }

      // MODAL: detaliul unei comenzi, cu drept de editare (Admin/Superadmin)
      // ------------------------------------------------------------------
      function renderComandaDetailModal(c, lines, context, onSaved) {
        const overlay = document.createElement("div");
        overlay.id = "comanda-detail-overlay";
        overlay.className =
          "fixed inset-0 z-40 flex items-center justify-center px-4 py-8 overflow-y-auto";
        overlay.style.background = "rgba(15,20,25,0.55)";

        const m = context.magazine.find((x) => x.id === c.magazin_id);
        const magazinLabel = m
          ? `${m.nume || m.email}${m.filiala ? " - " + m.filiala : ""}`
          : c.vanzare_directa
            ? "Vânzare directă"
            : "—";

        overlay.innerHTML = `
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-3xl fade-in my-auto">
      <div class="flex items-start justify-between mb-1">
        <h2 class="text-lg font-bold">${esc(c.numar_comanda)}</h2>
        <button id="comanda-detail-close" class="text-slate-400 hover:text-slate-600 text-xl leading-none">✕</button>
      </div>
      <p class="text-sm text-slate-500 mb-1">Magazin: <strong>${esc(magazinLabel)}</strong> · Agent: ${esc(c.agent || "—")}</p>
      ${c.observatii ? `<p class="text-xs text-slate-400 mb-3">Observații: ${esc(c.observatii)}</p>` : ""}
      <div id="comanda-lines-detail" class="space-y-2 my-4"></div>
      <div class="flex gap-2 pt-2 border-t" style="border-color:var(--line)">
        <button id="comanda-anuleaza" class="rounded-lg py-2.5 px-4 text-sm font-medium border text-red-600" style="border-color:var(--line)">Anulează comanda</button>
        <button id="comanda-trimite" class="ml-auto btn-primary rounded-lg py-2.5 px-5 text-sm">Trimite produsele pregătite</button>
      </div>
      <p id="comanda-detail-msg" class="text-sm text-center mt-2"></p>
    </div>`;
        document.body.appendChild(overlay);

        document
          .getElementById("comanda-detail-close")
          .addEventListener("click", () => overlay.remove());
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) overlay.remove();
        });

        const linesEl = document.getElementById("comanda-lines-detail");
        function paintLines() {
          linesEl.innerHTML = lines
            .map((l) => comandaLineRow(l, context))
            .join("");
          lines.forEach((l) =>
            bindComandaLineRow(l, context, paintLines, overlay, context.agenti),
          );
        }
        paintLines();

        document
          .getElementById("comanda-trimite")
          .addEventListener("click", async () => {
            const readyLines = lines.filter(
              (l) => l.status_linie === "asignat",
            );
            const msg = document.getElementById("comanda-detail-msg");
            if (!readyLines.length) {
              msg.className = "text-sm text-center text-red-600";
              msg.textContent = "Nu există produse pregătite de trimis.";
              return;
            }
            const btn = document.getElementById("comanda-trimite");
            btn.disabled = true;
            btn.textContent = "Se trimite...";

            for (const l of readyLines) {
              const produs = context.produse.find((p) => p.id === l.produs_id);
              if (!produs) continue;
              const payload = {
                magazin_id: c.magazin_id,
                agent: c.agent,
                telefon: m ? m.telefon || null : null,
                adresa_facturare: m ? m.adresa_facturare || null : null,
                vanzare_directa: !!c.vanzare_directa,
                updated_at: new Date().toISOString(),
              };
              if (!produs.data_comenzii) {
                payload.data_comenzii = new Date().toISOString().slice(0, 10);
              }
              await supa.from("produse").update(payload).eq("id", produs.id);
              await supa
                .from("comanda_produse")
                .update({ status_linie: "trimis" })
                .eq("id", l.id);
              l.status_linie = "trimis";
              Object.assign(produs, payload);
            }

            const newStatus = computeComandaStatus(lines);
            await supa
              .from("comenzi")
              .update({
                status: newStatus,
                updated_at: new Date().toISOString(),
              })
              .eq("id", c.id);

            toast("Produsele pregătite au fost trimise către magazin.");
            overlay.remove();
            onSaved();
          });

        document
          .getElementById("comanda-anuleaza")
          .addEventListener("click", async () => {
            const ok = confirm(`Anulezi definitiv comanda ${c.numar_comanda}?`);
            if (!ok) return;
            await supa
              .from("comenzi")
              .update({
                status: "anulata",
                updated_at: new Date().toISOString(),
              })
              .eq("id", c.id);
            toast("Comanda a fost anulată.");
            overlay.remove();
            onSaved();
          });
      }

        <h3 class="text-sm font-semibold text-slate-700 mb-2">${esc(label)} <span class="text-slate-400 font-normal">(${stocMagazin.length} produse)</span></h3>
        <div class="bg-white rounded-xl border overflow-x-auto" style="border-color:var(--line)">
          <table class="w-full text-sm min-w-[900px]">
            <thead>
              <tr class="text-left text-slate-500 border-b" style="border-color:var(--line)">
                <th class="px-3 py-2 font-medium">Nr.</th>
                <th class="px-3 py-2 font-medium">ID produs</th>
                <th class="px-3 py-2 font-medium">Categorie</th>
                <th class="px-3 py-2 font-medium">Marcă</th>
                <th class="px-3 py-2 font-medium">Culoare</th>
                <th class="px-3 py-2 font-medium">VIN</th>
                <th class="px-3 py-2 font-medium">Preț vânzare</th>
                <th class="px-3 py-2 font-medium">Preț cu TVA</th>
              </tr>
            </thead>
            <tbody>
              ${
                stocMagazin.length
                  ? stocMagazin
                      .map((p, i) => {
                        const comandaInfo = produsComandaMap.get(p.id);
                        return `
              <tr class="border-b last:border-0" style="border-color:var(--line)">
                <td class="px-3 py-2 text-slate-400">${i + 1}</td>
                <td class="px-3 py-2 font-mono text-xs">
                  <div class="flex flex-col items-start gap-1">
                    <span>${esc(p.id_produs)}</span>
                    ${comandaInfo ? `<button type="button" data-open-comanda-produs="${p.id}" class="comanda-produs-link inline-block px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-slate-100 text-slate-600 underline decoration-dotted hover:text-[var(--teal-dark)]" title="Deschide comanda inițială">${esc(comandaInfo.numar_comanda)}</button>` : ""}
                  </div>
                </td>
                <td class="px-3 py-2 text-xs">${esc(p.categorie || "—")}</td>
                <td class="px-3 py-2 text-xs">${esc(p.marca || "—")}</td>
                <td class="px-3 py-2 text-xs">${esc(p.culoare || "—")}</td>
                <td class="px-3 py-2 text-xs font-mono">${esc(p.vin || "—")}</td>
                <td class="px-3 py-2 text-xs font-medium">${fmtNum(p.pret_vanzare)}</td>
                <td class="px-3 py-2 text-xs font-medium">${fmtNum(p.pret_cu_tva)}</td>
              </tr>`;
                      })
                      .join("")
                  : `<tr><td colspan="8" class="px-3 py-4 text-center text-slate-400 text-xs">Niciun produs momentan.</td></tr>`
              }
            </tbody>
          </table>
        </div>
      </div>`;
          })
          .join("");

        (produse || []).forEach((p) => {
          const comandaInfo = produsComandaMap.get(p.id);
          if (!comandaInfo) return;
          const link = document.querySelector(
            `[data-open-comanda-produs="${p.id}"]`,
          );
          if (!link) return;
          link.addEventListener("click", () => {
            deschideComandaInitiala(comandaInfo, linii || [], profiles || []);
          });
        });
      }

      function renderAgentComenziTab(container) {
        container.innerHTML = `
    <div class="mb-4 flex gap-2">
      <button id="agent-tab-comenzi" class="agent-subtab-btn rounded-lg px-4 py-2 text-sm font-medium border" style="border-color:var(--line)">Comenzile mele</button>
      <button id="agent-tab-stoc" class="agent-subtab-btn rounded-lg px-4 py-2 text-sm font-medium border" style="border-color:var(--line)">Stoc magazine alocate</button>
    </div>
    <div id="agent-subtab-content"></div>`;
        const sub = document.getElementById("agent-subtab-content");
        const btnComenzi = document.getElementById("agent-tab-comenzi");
        const btnStoc = document.getElementById("agent-tab-stoc");
        function activate(which) {
          btnComenzi.classList.toggle("btn-primary", which === "comenzi");
          btnStoc.classList.toggle("btn-primary", which === "stoc");
          if (which === "comenzi") renderComenziAgent(sub);
          else renderAgentStoc(sub);
        }
        btnComenzi.addEventListener("click", () => activate("comenzi"));
        btnStoc.addEventListener("click", () => activate("stoc"));
        activate("comenzi");
      }

      function bindUserRow(p, magazine, viewerIsSuperadmin) {
        const row = document.querySelector(`tr[data-row="${p.id}"]`);
        if (!row) return;

        const roleSelect = row.querySelector(".role-select");
        const numeInput = row.querySelector(".nume-input");
        const telefonInput = row.querySelector(".telefon-input");
        const filialaInput = row.querySelector(".filiala-input");
        const magBox = row.querySelector(".magazine-box");
        const deleteBtn = row.querySelector(".delete-btn");
        const billingBtn = row.querySelector(".billing-btn");

        if (billingBtn) {
          billingBtn.addEventListener("click", () => {
            renderBillingAddressModal(p, billingBtn);
          });
        }

        if (deleteBtn && !deleteBtn.disabled) {
          deleteBtn.addEventListener("click", async () => {
            const lockedForViewer =
              p.role === "superadmin" && !viewerIsSuperadmin;
            if (lockedForViewer) {
              toast(
                "Doar un super admin poate șterge un cont de super admin.",
                true,
              );
              return;
            }
            const ok = confirm(
              `Ștergi definitiv contul ${p.email}? Acțiunea nu poate fi anulată.`,
            );
            if (!ok) return;

            deleteBtn.disabled = true;
            deleteBtn.textContent = "Se șterge...";
            const { data, error } = await supa.functions.invoke("delete-user", {
              body: { target_id: p.id },
            });
            const errMsg = error?.message || data?.error;
            if (errMsg) {
              toast("Eroare la ștergere: " + errMsg, true);
              deleteBtn.disabled = false;
              deleteBtn.textContent = "Șterge cont";
              return;
            }
            toast("Cont șters definitiv.");
            row.remove();
          });
        }

        roleSelect.addEventListener("change", () => {
          const role = roleSelect.value;
          numeInput.disabled = !role;
          telefonInput.disabled = !role;
          filialaInput.disabled = role !== "magazin";
          if (role === "agent")
            magBox.classList.remove("opacity-30", "pointer-events-none");
          else magBox.classList.add("opacity-30", "pointer-events-none");
        });

        row.querySelector(".save-btn").addEventListener("click", async () => {
          const btn = row.querySelector(".save-btn");

          if (p.role === "superadmin" && !viewerIsSuperadmin) {
            toast(
              "Doar un super admin poate modifica rolul unui super admin.",
              true,
            );
            return;
          }
          if (roleSelect.value === "superadmin" && !viewerIsSuperadmin) {
            toast(
              "Doar un super admin poate acorda rolul de super admin.",
              true,
            );
            return;
          }

          btn.disabled = true;
          btn.textContent = "Se salvează...";

          const role = roleSelect.value || null;
          const nume = numeInput.value.trim() || null;
          const telefon = telefonInput.value.trim() || null;
          const filiala = filialaInput.value.trim() || null;

          const { error: upErr } = await supa
            .from("profiles")
            .update({
              role,
              nume,
              telefon,
              filiala,
              updated_at: new Date().toISOString(),
            })
            .eq("id", p.id);

          if (upErr) {
            toast("Eroare: " + upErr.message, true);
            btn.disabled = false;
            btn.textContent = "Salvează";
            return;
          }

          if (role === "agent") {
            const checked = Array.from(
              row.querySelectorAll(".mag-check:checked"),
            ).map((c) => c.dataset.magazinId);
            await supa.from("agent_magazine").delete().eq("agent_id", p.id);
            if (checked.length) {
              const rows = checked.map((magId) => ({
                agent_id: p.id,
                magazin_id: magId,
              }));
              const { error: linkErr } = await supa
                .from("agent_magazine")
                .insert(rows);
              if (linkErr)
                toast(
                  "Eroare la alocarea magazinelor: " + linkErr.message,
                  true,
                );
            }
          }

          toast("Salvat cu succes.");
          btn.disabled = false;
          btn.textContent = "Salvează";
        });
      }
    </script>
  </body>
</html>
